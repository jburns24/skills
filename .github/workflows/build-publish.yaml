name: Build & Publish (reusable)

on:
  workflow_call:
    inputs:
      skill_name:
        type: string
        required: true
      version:
        type: string
        required: true

permissions:
  id-token: write
  attestations: write
  contents: read
  packages: write

env:
  SKILLS_OCI_VERSION: v0.0.11
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: 'stable'
          cache: false

      - name: Install skills-oci (go install — verified via sum.golang.org)
        run: |
          set -euo pipefail
          go install "github.com/salaboy/skills-oci@${SKILLS_OCI_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OCI artifact
        id: push
        run: |
          set -euo pipefail
          REF="${REGISTRY}/${{ steps.owner.outputs.value }}/skills/${{ inputs.skill_name }}:${{ inputs.version }}"
          LOG=$(mktemp)
          skills-oci push --plain "$REF" "./skills/${{ inputs.skill_name }}" | tee "$LOG"
          DIGEST=$(grep -oE 'sha256:[a-f0-9]{64}' "$LOG" | tail -n1)
          if [ -z "$DIGEST" ]; then
            echo "::error::skills-oci did not emit a sha256 digest on stdout"
            exit 1
          fi
          {
            echo "ref=$REF"
            echo "digest=$DIGEST"
            echo "subject=${REGISTRY}/${{ steps.owner.outputs.value }}/skills/${{ inputs.skill_name }}"
          } >> "$GITHUB_OUTPUT"

      - name: Attest artifact provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ steps.push.outputs.subject }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
