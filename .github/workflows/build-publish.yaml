name: Build & Publish (reusable)

# STUB: Future implementation will use skills-oci to push OCI artifacts to ghcr.io.
#
# Future wiring (not yet executed):
#   - uses: docker/login-action with registry: ghcr.io, permissions: packages: write
#   - run: skills-oci push ghcr.io/${{ github.repository_owner }}/skills/${{ inputs.skill_name }}:${{ inputs.version }} \
#              ./skills/${{ inputs.skill_name }} --plain

on:
  workflow_call:
    inputs:
      skill_name:
        type: string
        required: true
      version:
        type: string
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "STUB: would push ghcr.io/${{ github.repository_owner }}/skills/${{ inputs.skill_name }}:${{ inputs.version }}"
