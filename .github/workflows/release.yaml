name: Release

on:
  push:
    branches:
      - master
    paths:
      - skills/**

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      all_changed_files: ${{ steps.changed.outputs.all_changed_files }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - id: changed
        uses: tj-actions/changed-files@ed68ef82c095e0d48ec87eccea555d944a631a4c # v46.0.5
        with:
          files: skills/**
          dir_names: true
          dir_names_max_depth: 2
          matrix: true

  tag:
    needs: detect
    if: needs.detect.outputs.all_changed_files != '[]'
    strategy:
      matrix:
        skill: ${{ fromJson(needs.detect.outputs.all_changed_files) }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - id: skill-name
        name: Extract skill name
        run: echo "name=$(basename '${{ matrix.skill }}')" >> "$GITHUB_OUTPUT"

      - id: sts
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: jburns24/skills
          identity: tagger

      # NOTE: On first-ever release of a skill, default_bump: false will NOT create a tag
      # because no prior tag with the matching prefix exists to bump from.
      # Seed each skill's first tag manually:
      #   git tag <skill>-v0.0.0 && git push origin <skill>-v0.0.0
      # Or temporarily set default_bump: patch for the initial release.
      - name: Push semver tag
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ steps.sts.outputs.token }}
          tag_prefix: ${{ steps.skill-name.outputs.name }}-v
          default_bump: false
